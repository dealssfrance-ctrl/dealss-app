name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dashboard/**'
      - 'backend/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: https://rylxeslhdpyewtfexzll.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bHhlc2xoZHB5ZXd0ZmV4emxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDk2MDksImV4cCI6MjA5MTcyNTYwOX0.GLlZybgBBqUVK2wUnkf8xwdDSeghVuLtZjwe36Dnwdc
          VITE_API_URL: https://rylxeslhdpyewtfexzll.supabase.co/functions/v1/api
        run: npx vite build --base=/dealss-app/

      - name: Add 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
